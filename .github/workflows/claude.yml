name: Claude Assistant

# On-demand Claude: mention @claude in an issue, a PR comment, or a review
# to ask a question or request a change. Claude can read the repo, run the
# tests, and (in PR context) push commits to the PR branch.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read # lets @claude read CI results when asked to debug failures

jobs:
  claude:
    runs-on: ubuntu-latest
    # Only react when @claude is actually mentioned, and never from forks.
    if: >
      (github.event.comment && contains(github.event.comment.body, '@claude')) ||
      (github.event.review && contains(github.event.review.body, '@claude')) ||
      (github.event.issue && contains(github.event.issue.body, '@claude'))
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          # Max subscription via OAuth token (claude setup-token).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: |
            --max-turns 12
