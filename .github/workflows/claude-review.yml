name: Claude Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write
  actions: read # lets the reviewer read CI results and job logs

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip drafts, and skip PRs from forks (they have no access to the
    # secret, and we never run untrusted fork code with our credentials).
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          # Billed against the repo owner's Claude Pro/Max subscription via
          # an OAuth token (claude setup-token), not a metered API key.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Posts a live tracking comment and the final review to the PR.
          track_progress: true
          # Grants the reviewer the github_ci MCP tools to read CI results.
          additional_permissions: |
            actions: read
          # The contract lives in AGENTS.md (auto-loaded via CLAUDE.md) and
          # the path-scoped rules in .claude/rules/ load for the files this
          # PR touches. The prompt only sets priorities and posting rules,
          # so updating the contract never means editing this workflow.
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for Oscine. The project contract is in
            AGENTS.md (loaded automatically via CLAUDE.md), and the
            path-scoped rules in .claude/rules/ load for the files this PR
            touches. Prioritize those project invariants over generic style
            nits: command-catalog parity, the generated plugin/app mirror
            and its sync, layer boundaries, test coverage for new commands
            and OSC addresses, zero runtime dependencies, version bumps, and
            doc voice (no em-dashes or AI-tell vocabulary in human-facing
            docs). Also flag correctness, security, and audio-timing issues.

            CI runs the contract guards on this PR. If a check failed, read
            the logs with the github_ci tools and factor it into your
            review. Be specific and brief; approve cleanly when it is good.

            Use `gh pr comment` for top-level feedback and
            `mcp__github_inline_comment__create_inline_comment` (with
            `confirmed: true`) to flag specific lines. Only post GitHub
            comments; do not submit the review as a chat message.
          claude_args: |
            --max-turns 20
            --allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
