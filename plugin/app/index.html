<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oscine · Synth Composer</title>
  <!-- Installable web app: "Add to Home Screen" launches standalone (no
       browser chrome). Status bar stays solid dark so the transport row is
       never hidden under the notch. -->
  <meta name="theme-color" content="#0b0d12">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Oscine">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="icon" type="image/svg+xml" href="styles/brand/oscine-mark.svg">
  <link rel="apple-touch-icon" href="styles/brand/oscine-icon-180.png">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
